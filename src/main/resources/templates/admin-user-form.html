<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Form</title>
    <link rel="stylesheet" th:href="@{/MyStyle.css}">
</head>

<body>

<!-- 🔷 Navbar -->
<div class="navbar navbar-flex" style="padding:15px; border-bottom:1px solid #ddd;">

    <div style="display:flex; align-items:center; gap:12px;">
        <a th:href="@{/admin/users}" class="btn" style="padding:6px 12px; font-size:14px;">
            ← Back
        </a>

        <span style="font-weight:500;"
              th:text="${user.id == null ? 'Create User' : 'Edit User'}">
        </span>
    </div>

    <form th:action="@{/logout}" method="post">
        <button class="btn btn-logout">Logout</button>
    </form>

</div>

<!-- 🔷 Form Section -->
<div class="auth-wrapper">

    <div class="card" style="max-width:450px; width:100%;">

        <h2 style="text-align:center; margin-bottom:20px;"
            th:text="${user.id == null ? 'Create User' : 'Edit User'}">
        </h2>

        <form th:action="@{/admin/users/save}" th:object="${user}" method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required class="input-field">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required class="input-field">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select th:field="*{role}" class="input-field">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <button type="submit" class="btn" style="width:100%; margin-top:10px;">
                Save
            </button>

        </form>

    </div>

</div>

</body>
</html>
