<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup - Helpdesk</title>
    <link rel="stylesheet" th:href="@{/MyStyle.css}">
</head>

<body>

<div class="auth-wrapper">
    <div class="card">

        <form th:action="@{/signup}" method="post" th:object="${user}">
            
            <h2>Create Your Account</h2>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger">
                <p th:text="${error}"></p>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn">Register</button>

            <div class="link">
                <a th:href="@{/login}">Already have an account? Login</a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
